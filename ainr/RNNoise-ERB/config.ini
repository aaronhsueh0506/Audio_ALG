[signal]
sr = 16000
n_fft = 512
; win_len 和 hop_len 為 optional:
;   win_len 預設 = n_fft
;   hop_len 預設 = win_len // 2 (50% overlap → root Hann COLA 完美重建)
; 當 win_len < n_fft 時，自動 zero-pad 到 n_fft 做 FFT
; 取消註解可自訂:
; win_len = 320
; hop_len = 160
; --- Hybrid bands (ref: GTCRN) ---
; hybrid_cutoff_hz > 0 時啟用: cutoff 以下用原始 FFT bins, 以上用 ERB bands
; n_bands 由 hybrid 計算自動決定 (cutoff_bin + n_erb_high_bands)
; 設 hybrid_cutoff_hz = 0 時退回純 ERB 模式，使用 n_bands
hybrid_cutoff_hz = 0
n_erb_high_bands = 0
; hybrid 暫時關閉，使用純 ERB 模式 (n_bands = 32)
n_bands = 32
; (純 ERB fallback, hybrid 模式下此值被忽略)
lookahead_frames = 0
; 往後看幾個 frame (0 = causal, 1 = 1-frame lookahead)
; lookahead=1 會增加 hop_len 的延遲，但對 transient (e.g. 引擎轉速上升) 有幫助
; 訓練和推論必須使用相同設定

[paths]
speech_dir = /path/to/dns4/clean_speech
noise_dir = /path/to/dns4/noise
rir_dir = /path/to/dns4/impulse_responses
output_dir = ./output

[training]
epochs = 100
batch_size = 32
lr = 1e-3
device = cuda
epoch_size = 10000
; 每 epoch 隨機抽取的 sample 數 (0 = 全部)
; 例: 10000 × 3s = 8.3 小時/epoch
dropout = 0.15
; GRU 層間 dropout (0 = 不使用)
weight_decay = 0.05
; AdamW weight decay (預設 0.01)
early_stop_patience = 10
; val loss 連續 N epochs 沒改善就停訓 (0 = 不啟用)

; --- Loss 超參數 ---
gamma = 0.5
; perceptual exponent: 壓縮 gain space，低 gain 得到更多梯度 (0.5 = PercepNet 風格)
loss_over_weight = 2.5
; noise leak 懲罰倍率 (pred > target): 調小 → 容許更多殘留噪音，減少 over-suppression
loss_under_weight = 1.0
; over-suppression 懲罰倍率 (pred < target): 調大 → 減少語音失真，PESQ 提升
noise_frame_boost = 3.0
; 靜音幀的 loss 加權 (speech_weight < 0.1 時): 強調噪音抑制
speech_frame_scale = 2.0
; 語音幀的 loss 加權係數 (frame_weight = noise_boost + scale * speech_weight)

[inference]
gain_floor = 0.02
; gain 下限，防止 musical noise；調高 (e.g. 0.05) 會留更多殘留噪音但減少 artifact
attack_alpha = 0.5
; temporal smoothing 上升速率 (0~1，越大越快跟上語音開始)
release_alpha = 0.15
; temporal smoothing 下降速率 (0~1，越大 tail 越短，減少 over-suppression 但可能有 clipping)

[audio]
segment_sec = 3.0

[mixing]
; SNR 分段取樣: low:high:weight, ...
; 50% 在 [-10,10], 30% 在 [10,25], 20% 在 [25,40]
snr_ranges = -15:-5:0.3, -5:5:0.3, 5:15:0.25, 15:30:0.15
target_rms_min = -35
target_rms_max = -15
; dBFS

[rir]
p_rir = 0.8
; 套用 RIR 的機率
rt60_min = 0.1
rt60_max = 1.3
; 秒, Schroeder 積分法估算
early_rir_ms = 30.0
; early RIR 保留長度 (ms), 用於 dereverberation target
pre_delay_keep_ms = 1.0
; peak 前保留的 delay (ms)

[noise]
max_noise_mix = 3

[augmentation]
; --- RandBiquadFilter (ref: DeepFilterNet) ---
; 分別套用在 speech 和 noise (混合前, 獨立隨機參數)
p_biquad = 0.5
n_biquad_filters = 3
; 每次最多幾個 biquad filter
biquad_gain_db = 15.0
; ±gain 範圍 (dB)
biquad_q_min = 0.5
biquad_q_max = 1.5
; 6 種 type: LowPass, HighPass, LowShelf, HighShelf, PeakingEQ, Notch
; 頻率範圍依 type:
;   LowPass 4-8kHz, HighPass 40-400Hz, LowShelf 40-1000Hz,
;   HighShelf 1-8kHz, PeakingEQ 40-4000Hz, Notch 40-4000Hz

; --- Bandwidth Limitation ---
; 混合後同時套用在 noisy 和 target (相同 target SR)
p_resample = 0.3
resample_sr_min = 8000
resample_sr_max = 15000

; --- Clipping Distortion ---
; 只套用在 noisy (distortion, target 不變)
p_clipping = 0.1
clip_snr_min = 0
clip_snr_max = 20
